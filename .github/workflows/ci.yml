name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  smoke-test:
    name: Core pipeline (CLIP-stubbed)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (no torch / CLIP needed for smoke test)
        run: |
          pip install --upgrade pip
          pip install faiss-cpu numpy Pillow fastapi uvicorn python-multipart pydantic

      - name: Run smoke test (FakeEngine — no GPU, no model download)
        run: |
          cd backend
          python scripts/smoke_test.py

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/app --select E,F,W --ignore E501
